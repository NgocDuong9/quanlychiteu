<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Ứng dụng quản lý chi tiêu cá nhân" />

    <!-- iOS Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Chi Tiêu" />

    <!-- Preload splash assets -->
    <link rel="preload" href="/favicon.png" as="image" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <title>Quản Lý Chi Tiêu</title>
  </head>
  <body
    style="
      margin: 0;
      background: #000;
      font-family:
        -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, Oxygen,
        Ubuntu, sans-serif;
      -webkit-font-smoothing: antialiased;
    "
  >
    <!-- Static splash screen (OUTSIDE root so React won't nuke it) -->
    <div
      id="static-splash"
      style="position: fixed; inset: 0; z-index: 9999; overflow: hidden"
    >
      <div style="position: absolute; inset: 0; background: #000000"></div>
      <div
        style="
          position: relative;
          z-index: 1;
          height: 100%;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
        "
      >
        <img
          src="/favicon.png"
          alt=""
          style="
            width: 92px;
            height: 92px;
            border-radius: 24px;
            box-shadow:
              0 0 30px rgba(255, 149, 0, 0.3),
              0 0 60px rgba(255, 149, 0, 0.15),
              0 8px 32px rgba(0, 0, 0, 0.5);
          "
        />
        <div
          style="
            margin-top: 28px;
            font-family:
              -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto,
              sans-serif;
            font-size: 26px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 1px;
            text-shadow:
              0 0 20px rgba(255, 149, 0, 0.4),
              0 2px 10px rgba(0, 0, 0, 0.8);
          "
        >
          Quản Lý Chi Tiêu
        </div>
        <div
          style="
            margin-top: 16px;
            font-family:
              -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto,
              sans-serif;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 0.5px;
            font-style: italic;
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.8);
            text-align: center;
            padding: 0 32px;
            max-width: 340px;
          "
          id="splash-quote"
        ></div>
        <script>
          (function () {
            var q = [
              "Có chồng chi tiêu rõ ràng, vợ yên tâm shopping ngang nhiên",
              "Lương về tay vợ, hạnh phúc về tay chồng",
              "Nhà mình nghèo tiền thôi, chứ giàu tình lắm",
              "Vợ chồng mình cùng cố gắng, con Bo sẽ có tất cả",
              "Yêu nhau mấy núi cũng leo, mấy khoản chi tiêu cũng ghi",
              "Tiền hết có thể kiếm lại, nhưng em thì chỉ có một",
              "Gia đình nhỏ, ước mơ to, cùng nhau cố gắng từng ngày",
              "Hôm nay tiết kiệm một chút, mai mốt đưa con đi chơi xa",
              "Anh lo kiếm tiền, em lo giữ tiền, Bo lo... dễ thương",
              "Đồng nào cũng là mồ hôi, nên mình ghi lại cho đời bớt lo",
              "Hai vợ chồng một túi tiền, ghi chép cẩn thận bình yên cả nhà",
              "Cơm nhà nấu ngon hơn tiệm, vì có tình yêu nêm vào",
              "Mỗi ngày thêm yêu nhau, mỗi ngày thêm biết tiết kiệm",
              "Con Bo lớn lên sẽ tự hào vì ba mẹ giỏi quá",
            ];
            document.getElementById("splash-quote").textContent =
              q[Math.floor(Math.random() * q.length)];
          })();
        </script>
      </div>
    </div>
    <style></style>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
